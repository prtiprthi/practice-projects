<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h3 id="heading">How many times I overthought today 💭</h3>
    <div id="counter">
      <div id="count">
        <h2 id="display">0</h2>
      </div>
      <div id="button">
        <button class="buttons" onclick="increase()">+</button>
        <button class="buttons" onclick="decrease()">-</button>
        <button class="buttons" onclick="reset()">Reset</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
